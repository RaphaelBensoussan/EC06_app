name: Pipeline CI-CD - EC06

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  lint:
    name: Verification de la Qualite (Linter)
    runs-on: ubuntu-latest

    steps:
      - name: Recuperation du code
        uses: actions/checkout@v4

      - name: Creation du fichier .env de test
        run: cp .env.dist .env

      - name: Execution du Linter dans Docker
        run: docker compose run --rm app npm run lint

      - name: Arret des conteneurs
        if: always()
        run: docker compose down

  test:
    name: Execution des Tests Unitaires (Jest)
    runs-on: ubuntu-latest

    steps:
      - name: Recuperation du code
        uses: actions/checkout@v4

      - name: Creation du fichier .env de test
        run: cp .env.dist .env

      - name: Execution des tests dans Docker
        run: docker compose run --rm app npm test | tee test-results.txt

      - name: Depot de l'artefact de tests
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.txt

      - name: Arret des conteneurs
        if: always()
        run: docker compose down

  build:
    name: Construction et Analyse de l'image
    needs: [lint, test]
    runs-on: ubuntu-latest

    steps:
      - name: Recuperation du code
        uses: actions/checkout@v4

      - name: Build de l'image Docker
        run: |
          SHA_SHORT=$(git rev-parse --short HEAD)
          echo "SHA_SHORT=$SHA_SHORT" >> $GITHUB_ENV
          docker build -t skillhub-api:$SHA_SHORT -t skillhub-api:latest .

      - name: Scan de vulnerabilites de l'image avec Trivy (Bonus)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'skillhub-api:${{ env.SHA_SHORT }}'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Connexion a Docker Hub (Bonus)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push de l'image vers Docker Hub (Bonus)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          docker tag skillhub-api:${{ env.SHA_SHORT }} ${{ secrets.DOCKER_USERNAME }}/skillhub-api:${{ env.SHA_SHORT }}
          docker tag skillhub-api:${{ env.SHA_SHORT }} ${{ secrets.DOCKER_USERNAME }}/skillhub-api:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/skillhub-api:${{ env.SHA_SHORT }}
          docker push ${{ secrets.DOCKER_USERNAME }}/skillhub-api:latest

  deploy:
    name: Deploiement Simule
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Recuperation du code
        uses: actions/checkout@v4

      - name: Execution du script de deploiement
        run: |
          chmod +x deploy.sh
          ./deploy.sh

      - name: Depot du log de deploiement
        uses: actions/upload-artifact@v4
        with:
          name: deploy-log
          path: deploy.log
